<!DOCTYPE html>
<html>
<head>
<title>Signup | AI Hospital</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at top,#0a0a0a,#020202);
    overflow:hidden;
}

/* animated grid */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(255,0,0,0.12) 1px, transparent 1px);
    background-size:40px 40px;
    animation:moveBg 20s linear infinite;
}

@keyframes moveBg{
    from{transform:translate(0,0)}
    to{transform:translate(-200px,-200px)}
}

/* card */
.card{
    width:350px;
    padding:35px;
    border-radius:20px;
    background:rgba(15,15,15,0.9);
    box-shadow:0 0 40px rgba(255,0,0,0.5);
    border:1px solid rgba(255,0,0,0.4);
    backdrop-filter:blur(15px);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#ff4b5c;
}

/* inputs */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:none;
    background:#0f0f0f;
    color:white;
    outline:none;
    transition:.3s;
}

input:focus{
    box-shadow:0 0 15px #ff2f45;
}

/* button */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:25px;
    background:linear-gradient(90deg,#ff2f45,#ffd84d);
    color:black;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    box-shadow:0 0 25px rgba(255,0,0,0.8);
}

p{
    text-align:center;
    margin-top:15px;
    font-size:13px;
}

a{
    color:#ffd84d;
    text-decoration:none;
}

</style>
</head>

<body>

<div class="card">

<h2>📝 Signup</h2>

<form method="POST">
<input name="username" placeholder="👤 Username" required>
<input type="password" name="password" placeholder="🔒 Password" required>
<button type="submit">Create Account</button>
</form>

<p>Already have account? <a href="/login">Login</a></p>

</div>

</body>
</html>

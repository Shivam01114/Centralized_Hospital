<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Heart Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='heart/css/style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<!-- 🔥 TOP NAVBAR -->
<div class="top-nav">

    <div class="logo">🧠 CardioSense AI</div>

    <div class="nav-buttons">
        <button onclick="location.href='{{ url_for('main.home') }}'">🏠 Home</button>
        <button onclick="location.href='{{ url_for('main.select_page') }}'">🧬 Diseases</button>
        <button onclick="location.href='{{ url_for('main.history') }}'">📊 History</button>
        <button onclick="location.href='{{ url_for('auth.logout') }}'">🚪 Logout</button>
    </div>

</div>
<div class="dashboard">

<div class="sidebar">
<h2 class="brand-title">
🧠 CardioSense AI
<span>Smart Heart Intelligence</span>
</h2>

<ul>
<li class="active" onclick="location.href='{{ url_for('heart.heart_home') }}'">Overview</li>
<li onclick="location.href='{{ url_for('heart.heart_home') }}'">AI Decision</li>
<li onclick="location.href='/heart/reports'">Reports</li>
</ul>
</div>

<div class="main-content">
<h1 class="page-title">
❤️ Patient Cardiac Health Analysis
<span>AI-Driven Risk Evaluation & Insights</span>
</h1>

<!-- ✅ FORM -->
<form action="{{ url_for('heart.heart_predict') }}" method="POST">

<div class="form-grid">

<!-- ✅ ID + NAME BOTH -->
<input id="age" name="age" placeholder="Age" required>
<input id="sex" name="sex" placeholder="Sex (1=Male,0=Female)" required>
<input id="cp" name="cp" placeholder="Chest Pain (0–3)" required>
<input id="trestbps" name="trestbps" placeholder="Blood Pressure" required>
<input id="chol" name="chol" placeholder="Cholesterol" required>
<input id="fbs" name="fbs" placeholder="Sugar (1/0)" required>
<input id="restecg" name="restecg" placeholder="ECG (0–2)" required>
<input id="thalach" name="thalach" placeholder="Max Heart Rate" required>
<input id="exang" name="exang" placeholder="Angina (1/0)" required>
<input id="oldpeak" name="oldpeak" placeholder="Oldpeak" required>
<input id="slope" name="slope" placeholder="Slope (0–2)" required>
<input id="ca" name="ca" placeholder="CA (0–4)" required>
<input id="thal" name="thal" placeholder="Thal (1–3)" required>

</div>

<div class="buttons">
<button type="button" onclick="fillDemo()">Demo</button>
<button type="button" onclick="resetForm()">Reset</button>
<button type="submit">Analyze</button>
</div>

</form>

<!-- UI -->
<div class="meter-bg"><div id="riskFill"></div></div>
<p id="riskText"></p>

<h2 id="result">
{% if prediction is not none %}
Prediction: {{ prediction }}
{% endif %}
</h2>

<!-- CHART -->
<div class="info-box">
<h3>📊 Key Clinical Parameters</h3>
<canvas id="vitalsChart" height="120"></canvas>
</div>

</div>
</div>

<!-- JS -->
<script src="{{ url_for('static', filename='heart/js/script.js') }}"></script>
<script src="{{ url_for('static', filename='heart/js/charts.js') }}"></script>

<script>
if(typeof initChart === "function") initChart();
</script>

</body>
</html>

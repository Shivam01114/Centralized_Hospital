<!DOCTYPE html>
<html>
<head>
<title>AI Hospital System</title>

<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:linear-gradient(135deg,#020202,#0a0a0a,#120006);
    color:white;
    overflow:hidden;
}

/* ===== BACKGROUND GRID ===== */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background:radial-gradient(circle, rgba(255,0,0,0.12) 1px, transparent 1px);
    background-size:35px 35px;
    animation:moveBg 18s linear infinite;
}

@keyframes moveBg{
    from{transform:translate(0,0)}
    to{transform:translate(-200px,-200px)}
}

/* ===== LAYOUT ===== */
.container{
    display:flex;
    height:100vh;
}

/* ===== LEFT ===== */
.left{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

.robot{
    width:80%;
    max-width:600px;
    animation:float 3s ease-in-out infinite alternate;
}

@keyframes float{
    from{transform:translateY(0)}
    to{transform:translateY(-20px)}
}

.left::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:radial-gradient(circle, rgba(255,0,0,0.4), transparent);
    filter:blur(80px);
    z-index:-1;
}

/* ===== RIGHT ===== */
.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:420px;
    padding:40px;
    border-radius:25px;
    background:rgba(15,15,15,0.9);
    box-shadow:0 0 60px rgba(255,0,0,0.5);
    border:1px solid rgba(255,0,0,0.4);
    backdrop-filter:blur(12px);
}

/* TITLE */
.title{
    text-align:center;
    font-size:28px;
    color:#ff4b5c;
}

.subtitle{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-bottom:25px;
}

/* INPUT */
input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border-radius:12px;
    border:none;
    background:#0f0f0f;
    color:white;
}

input:focus{
    box-shadow:0 0 15px #ff2f45;
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#ff2f45,#ffd84d);
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:5px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

/* SECOND BUTTON */
.secondary-btn{
    margin-top:12px;
    background:linear-gradient(90deg,#00c6ff,#0072ff);
    color:white;
}

/* ECG */
.ecg{
    position:absolute;
    bottom:0;
    width:100%;
    height:80px;
}

.ecg-line{
    width:200%;
    height:100%;
    background:linear-gradient(90deg,transparent,red,transparent);
    animation:ecgMove 1s linear infinite;
}

@keyframes ecgMove{
    from{transform:translateX(0)}
    to{transform:translateX(-50%)}
}

</style>
</head>

<body>

<div class="container">

<!-- LEFT -->
<div class="left">
    <lottie-player
        src="https://assets9.lottiefiles.com/packages/lf20_9wpyhdzo.json"
        background="transparent"
        speed="1"
        class="robot"
        loop autoplay>
    </lottie-player>
</div>

<!-- RIGHT -->
<div class="right">

<div class="card">

<div class="title">🧠 AI Medical Intake</div>
<div class="subtitle">Enter Patient Details</div>

<!-- ✅ FIXED FORM ACTION -->
<form action="{{ url_for('main.save_patient') }}" method="POST">

<input name="name" placeholder="👤 Full Name" required>
<input name="age" placeholder="🎂 Age" required>
<input name="gender" placeholder="⚧ Gender" required>
<input name="phone" placeholder="📞 Phone Number" required>

<button type="submit">🚀 Start AI Diagnosis</button>

</form>

<!-- ✅ HISTORY BUTTON -->
<button class="secondary-btn"
onclick="location.href='{{ url_for('main.history') }}'">
📊 View History
</button>

</div>

</div>

</div>

<!-- ECG -->
<div class="ecg">
    <div class="ecg-line"></div>
</div>

<script>
window.onload = () => {
    const msg = new SpeechSynthesisUtterance(
        "Welcome to AI Hospital System. Please enter your details."
    );
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
}
</script>

</body>
</html>
